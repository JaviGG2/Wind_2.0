<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Wind Patrimonio</title>
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
    <main class="contenedor-principal">
        <div class="tarjeta-registro">
            <h2>Crear Cuenta en Wind</h2>
            <p>Únete a nuestra comunidad para descubrir y preservar la historia.</p>
            
            <form id="formulario-registro">
                <div class="grupo-campo">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" required placeholder="Ej. Juan Pérez">
                </div>
                <div class="grupo-campo">
                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" required placeholder="ejemplo@correo.com">
                </div>
                <div class="grupo-campo">
                    <label for="username">Nombre de Usuario (@):</label>
                    <input type="text" id="username" required placeholder="Ej. juan_coro">
                </div>
                <div class="grupo-campo">
                    <label for="contrasena">Contraseña:</label>
                    <input type="password" id="contrasena" required placeholder="Mínimo 6 caracteres">
                </div>
                <button type="submit" class="boton-enviar">Registrarse</button>
            </form>

            <div id="seccion-codigo" style="display: none;">
    <h2>Verifica tu Cuenta</h2>
    <p>Ingresa el código de 6 dígitos que enviamos a tu correo electrónico.</p>
    
    <form id="form-verificar">
        <input type="hidden" id="verificar-correo">
        
        <div class="grupo-campo">
            <label for="codigo-input">Código de Seguridad:</label>
            <input type="text" id="codigo-input" maxlength="6" placeholder="000000" required style="text-align: center; letter-spacing: 5px; font-size: 24px;">
        </div>
        
        <button type="submit" class="btn-naranja">Activar Cuenta</button>
    </form>
    
    <div id="mensaje-codigo" style="margin-top: 15px; color: #ff4d4d;"></div>
</div>

            <div id="mensaje-consola" class="mensaje-oculto"></div>
            <a href="/login" class="boton-secundario">Volver a iniciar sesión</a>
        </div>
    </main>

    <script src="/js/Registro.js"></script>
</body>
</html>
