<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Wind Patrimonio</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/registro.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>
<body>
    <main class="contenedor-principal">
        <div class="tarjeta-registro">
            <h2>Crear Cuenta en Wind</h2>
            <p>Únete a nuestra comunidad para descubrir y preservar la historia.</p>
            
            <form id="formulario-registro">
                <div class="grupo-campo">
                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" required placeholder="Ej. Juan Pérez">
                </div>
                <div class="grupo-campo">
                    <label for="correo">Correo Electrónico:</label>
                    <input type="email" id="correo" required placeholder="ejemplo@correo.com">
                </div>
                <div class="grupo-campo">
                    <label for="username">Nombre de Usuario (@):</label>
                    <input type="text" id="username" required placeholder="Ej. juan_coro">
                </div>
                <div class="grupo-campo">
                    <label for="contrasena">Contraseña:</label>
                    <div class="campo-con-ojo">
                        <input type="password" id="contrasena" required placeholder="Mínimo 6 caracteres">
                        <button type="button" class="btn-ojo" data-target="contrasena" tabindex="-1">
                            <span class="material-symbols-outlined">visibility_off</span>
                        </button>
                    </div>
                    <small class="input-ayuda" id="password-requisitos">Debe tener al menos 6 caracteres, 1 mayúscula, 1 número y 1 carácter especial</small>
                </div>
                <div class="grupo-campo">
                    <label for="contrasena-confirmar">Confirmar Contraseña:</label>
                    <div class="campo-con-ojo">
                        <input type="password" id="contrasena-confirmar" required placeholder="Repite la contraseña">
                        <button type="button" class="btn-ojo" data-target="contrasena-confirmar" tabindex="-1">
                            <span class="material-symbols-outlined">visibility_off</span>
                        </button>
                    </div>
                    <small class="input-ayuda" id="confirmar-ayuda"></small>
                </div>
                <button type="submit" class="boton-enviar">Registrarse</button>
            </form>

            <div id="seccion-codigo">
    <h2>Verifica tu Cuenta</h2>
    <p>Ingresa el código de 6 dígitos que enviamos a tu correo electrónico.</p>
    
    <form id="form-verificar">
        <input type="hidden" id="verificar-correo">
        
        <div class="grupo-campo">
            <label for="codigo-input">Código de Seguridad:</label>
            <input type="text" id="codigo-input" maxlength="6" placeholder="000000" required>
        </div>
        
        <button type="submit" class="btn-naranja">Activar Cuenta</button>
    </form>
    
    <div id="mensaje-codigo"></div>
</div>

            <div id="mensaje-consola" class="mensaje-oculto"></div>
            <a href="/login" class="boton-secundario">Volver a iniciar sesión</a>
        </div>
    </main>

    <script src="/js/Registro.js"></script>
</body>
</html>
