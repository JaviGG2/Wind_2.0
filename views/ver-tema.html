<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind - Explorar Contenido Patrimonial</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/ver-tema.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <meta name="theme-color" content="#ff4500">

    
</head>

    

<body>
    <script src="/js/menu.js"></script>
    <main class="pantalla-tema">
        <a href="/home" class="btn-retroceder" aria-label="Volver al inicio">
            <span class="material-symbols-outlined back-icon">arrow_back</span>
            <span class="back-text">Volver al Inicio</span>
        </a>

        <div id="bloque-carga" class="cargando-contenedor">
            <p>Cargando el contenido patrimonial...</p>
        </div>

        <article id="bloque-contenido" class="articulo-patrimonial" style="display: none;">
            <span id="txt-categoria" class="categoria-tag"></span>
            <h1 id="txt-titulo"></h1>
            <p id="txt-meta" class="autor-fecha"></p>
            
            <div id="img-portada" class="imagen-principal"></div>

            <div id="txt-cuerpo" class="cuerpo-contenido"></div>
        </article>
    </main>

    <script src="/js/ver-temas.js"></script>
</body>
</html>
