<!DOCTYPE html>
<html lang="es">
<head><style>body{background:#f5f6f8}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind - Explorar Contenido Patrimonial</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/css/base.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/ver-tema.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/menu.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/animaciones.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/info-popup.css?v={{ cacheVersion }}">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <meta name="theme-color" content="#ff4500">

    
</head>

    

<body>
    <script src="/js/menu.js?v={{ cacheVersion }}"></script>
    <main class="pantalla-tema">
        <div class="barra-superior">
            <a href="javascript:history.back()" class="btn-retroceder" aria-label="Volver al inicio">
                <span class="material-symbols-outlined back-icon">arrow_back</span>
                Atrás
                <span class="back-text"></span>
            </a>
            
            <div class="traductor-toolbar" id="traductor-toolbar">
                <button type="button" id="btn-mobile-translate" class="btn-mobile-translate material-symbols-outlined" aria-label="Traducir contenido">translate</button>
                <div class="traductor-collapse anim-fade-down">
                    <select id="idioma-select" class="traductor-select ">
                        <option value="en">Inglés</option>
                        <option value="fr">Francés</option>
                        <option value="pt">Portugués</option>
                        <option value="it">Italiano</option>
                        <option value="de">Alemán</option>
                        <option value="ja">Japonés</option>
                        <option value="zh">Chino</option>
                        <option value="ko">Coreano</option>
                        <option value="ru">Ruso</option>
                        
                    </select>
                    <button type="button" id="btn-traducir" class="btn-traducir">Traducir</button>
                    <button type="button" id="btn-original" class="btn-original anim-fade-in" style="display:none">Original</button>
                    <span id="traduciendo" class="traduciendo anim-fade-in" style="display:none">Traduciendo...</span>
                </div>
                <a href="/mapa" id="btn-ver-mapa" class="btn-ver-mapa material-symbols-outlined" aria-label="Ver en mapa">map</a>
                <button type="button" class="btn-denunciar" id="btn-denunciar" aria-label="Denunciar">
                    <span class="material-symbols-outlined">report</span>
                    
                </button>
                
                
            </div>
        </div>

        <div id="bloque-carga" class="cargando-contenedor anim-fade-in">
            <p>Cargando el contenido patrimonial...</p>
            <img src="/images/loading-4.svg" class="anim-loading" alt="Cargando...">
        </div>

        <article id="bloque-contenido" class="articulo-patrimonial anim-fade-up" style="display: none;">
            <span id="txt-categoria" class="categoria-tag"></span>
            <h1 id="txt-titulo"></h1>
            <p id="txt-meta" class="autor-fecha"></p>

            <div id="img-portada" class="imagen-principal"></div>

            <div id="txt-cuerpo" class="cuerpo-contenido"></div>

            <div class="valoracion-section" id="valoracion-section">
                <div class="valoracion-header">
                    <span class="material-symbols-outlined">star</span>
                    Valoraciones
                </div>
                <div class="valoracion-body">
                    <div class="valoracion-promedio" id="val-promedio">—</div>
                    <div class="star-rating" id="star-rating-detalle">
                        <span class="star" data-val="1"><span class="material-symbols-outlined">star</span></span>
                        <span class="star" data-val="2"><span class="material-symbols-outlined">star</span></span>
                        <span class="star" data-val="3"><span class="material-symbols-outlined">star</span></span>
                        <span class="star" data-val="4"><span class="material-symbols-outlined">star</span></span>
                        <span class="star" data-val="5"><span class="material-symbols-outlined">star</span></span>
                    </div>
                    <div class="valoracion-count" id="val-count">(0 valoraciones)</div>
                    
                </div>
            </div>

            
        </article>

        

        <section class="seccion-comentarios" id="seccion-comentarios">
            <h2 class="comentarios-titulo">
                <span class="material-symbols-outlined">chat</span>
                Comentarios <span id="comentarios-count" class="comentarios-count">0</span>
            </h2>
            <div class="comentario-form">
                <textarea id="comentario-input" class="comentario-textarea" rows="3" placeholder="Escribe un comentario..." maxlength="1000"></textarea>
                <button id="comentario-enviar" class="comentario-btn">Publicar</button>
            </div>
            <div id="comentarios-lista" class="comentarios-lista"></div>
        </section>
    <div id="modal-denuncia" class="modal-denuncia-overlay" style="display:none;">
        <div class="modal-denuncia">
            <div class="modal-denuncia-header">
                <h3>Denunciar tema</h3>
                <button type="button" class="modal-denuncia-close" id="modal-denuncia-close">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <p class="modal-denuncia-desc">Selecciona el motivo de la denuncia:</p>
            <div class="modal-denuncia-opciones" id="modal-denuncia-opciones">
                <button type="button" class="denuncia-opcion" data-motivo="Contenido inapropiado">
                    <span class="material-symbols-outlined">block</span>
                    Contenido inapropiado
                </button>
                <button type="button" class="denuncia-opcion" data-motivo="Información incorrecta">
                    <span class="material-symbols-outlined">error_outline</span>
                    Información incorrecta
                </button>
                <button type="button" class="denuncia-opcion" data-motivo="Spam o publicidad">
                    <span class="material-symbols-outlined">campaign</span>
                    Spam o publicidad
                </button>
            </div>
            <div id="denuncia-msg" class="denuncia-msg"></div>
        </div>
    </div>
    </main>

    <script src="/js/ver-temas.js?v={{ cacheVersion }}"></script>
    <script>
      document.getElementById('btn-mobile-translate')?.addEventListener('click', function(e) {
        e.stopPropagation();
        document.getElementById('traductor-toolbar').classList.toggle('is-open');
      });
      document.addEventListener('click', function(e) {
        const toolbar = document.getElementById('traductor-toolbar');
        if (toolbar?.classList.contains('is-open') && !toolbar.querySelector('.traductor-collapse')?.contains(e.target) && e.target !== document.getElementById('btn-mobile-translate')) {
          toolbar.classList.remove('is-open');
        }
      });
    </script>
    <script type="module" src="/js/info-burbuja.js?v={{ cacheVersion }}"></script>
</body>
</html>
