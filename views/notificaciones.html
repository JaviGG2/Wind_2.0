<!DOCTYPE html>
<html lang="es">
<head><style>body{background:#f5f6f8}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notificaciones — Wind</title>
  <link rel="stylesheet" href="/css/base.css?v={{ cacheVersion }}">
  <link rel="stylesheet" href="/css/menu.css?v={{ cacheVersion }}">
  <link rel="stylesheet" href="/css/animaciones.css?v={{ cacheVersion }}">
  <link rel="stylesheet" href="/css/notificaciones.css?v={{ cacheVersion }}">
  <link rel="icon" href="/img/favicon.ico">
</head>
<body>
  <div id="menu-placeholder"></div>

    <main class="notif-container anim-fade-in">
    <div class="notif-header">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <a href="javascript:void(0)" class="btn-volver" onclick="history.back()" aria-label="Volver">
          <span class="material-symbols-outlined">arrow_back</span>
          Atrás
        </a>
        <h1>Notificaciones</h1>
      </div>
      <div class="notif-actions">
        <button id="btn-leer-todas" class="notif-btn-secondary material-symbols-outlined">done_all</button>
        <button id="btn-vaciar" class="notif-btn-danger material-symbols-outlined">delete</button>
      </div>
    </div>
    <div id="notif-list" class="notif-list">
      <img src="/images/loading.svg" class="anim-loading" alt="Cargando...">
    </div>
  </main>

  <script src="/js/menu.js?v={{ cacheVersion }}"></script>
  <script src="/js/notificaciones.js?v={{ cacheVersion }}"></script>
</body>
</html>
