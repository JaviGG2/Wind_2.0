<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad — Wind</title>
    <meta name="description" content="Explora los relatos de la comunidad Wind. Historias del patrimonio cultural de Coro compartidas por sus habitantes.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/home.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/search.css">
    <link rel="stylesheet" href="/css/comunidad.css">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/info-popup.css">
    <link rel="stylesheet" href="/css/animaciones.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <meta name="theme-color" content="#ff4500">
</head>
<body>
    <script src="/js/menu.js"></script>
    <script src="/js/search.js"></script>
    <script src="/js/info.js"></script>
    <script type="module" src="/js/info-burbuja.js"></script>

    <div class="app-layout">
        <div id="buscar-placeholder"></div>
        <div id="menu-placeholder"></div>

        <main class="contenido-principal anim-fade-down">

            <section class="comunidad-hero">
                <div class="hero-glow"></div>
                <div class="hero-content">
                    <span class="hero-eyebrow"><span class="material-symbols-outlined">groups</span> Comunidad Wind</span>
                    <h1 class="hero-title">Relatos de Nuestra Gente</h1>
                    <p class="hero-subtitle">Voces, memorias y experiencias compartidas por los habitantes de Coro y sus alrededores.</p>
                    <a href="/crear-relato" class="btn-crear-relato">
                        <span class="material-symbols-outlined">edit_note</span>
                        Compartir mi Relato
                    </a>
                </div>
            </section>

                <div>
                <button type="button" data-info="Comunidad" class="btn-info-icono" aria-label="Información">
                <span class="help">¿Qué es este apartado?</span>
                </button>
                <button type="button" data-info="Relatos" class="btn-info-icono" aria-label="Información">
                <span class="help">¿Cómo publico mi historia?</span>
                </button>
                </div>

            <section class="filtros-seccion">
                <div class="filtros-header">
                    <h2 class="filtros-titulo">Explorar Relatos</h2>
                    <div id="contador-relatos" class="relatos-count">Cargando...</div>
                </div>

            </section>

            <section class="relatos-grid-section">
                <div id="relatos-grid" class="relatos-grid">
                    <div class="loading-skeleton">
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                        <div class="skeleton-card"></div>
                    </div>
                </div>
                <div id="relatos-empty" class="relatos-empty" style="display:none;">
                    <span class="material-symbols-outlined empty-icon">sentiment_dissatisfied</span>
                    <p>No hay relatos en esta categoría aún.</p>
                    <a href="/crear-relato" class="btn-crear-relato small">Sé el primero en escribir</a>
                </div>
            </section>

        </main>
    </div>

    <script src="/js/comunidad.js"></script>
</body>
</html>
