<!DOCTYPE html>
<html lang="es">
<head><style>body{background:#f5f6f8}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad — Wind</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<meta name="description" content="Explora los relatos de la comunidad Wind. Historias del patrimonio cultural de Coro compartidas por sus habitantes.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="/css/base.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/home.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/menu.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/search.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/comunidad.css?v={{ cacheVersion }}">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/info-popup.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/animaciones.css?v={{ cacheVersion }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <meta name="theme-color" content="#ff4500">
</head>
<body>
    <script src="/js/menu.js?v={{ cacheVersion }}"></script>
    <script src="/js/search.js?v={{ cacheVersion }}"></script>
    <script src="/js/info.js?v={{ cacheVersion }}"></script>
    <script type="module" src="/js/info-burbuja.js?v={{ cacheVersion }}"></script>

    <div class="app-layout">
        <div id="buscar-placeholder"></div>
        <div id="menu-placeholder"></div>

        <main class="contenido-principal anim-fade-down">

            <section class="comunidad-hero">
                <div class="hero-glow"></div>
                <div class="hero-content">
                    <span class="hero-eyebrow"><span class="material-symbols-outlined">groups</span> Comunidad Wind</span>
                    <h1 class="hero-title">Relatos de Nuestra Gente</h1>
                    <p class="hero-subtitle">Voces, memorias y experiencias compartidas por los habitantes de Coro y sus alrededores.</p>
                    <a href="/crear-relato" class="btn-crear-relato">
                        <span class="material-symbols-outlined">edit_note</span>
                        Compartir mi Relato
                    </a>
                </div>
            </section>

            <section class="filtros-seccion">
                <div class="filtros-header">
                    <div style="display:flex; align-items:center; justify-content:space-between; width:100%;">
                        <h2 class="filtros-titulo">Explorar Relatos</h2>
                        <button type="button" data-info="Ayuda-Comunidad" class="btn-info-icono" aria-label="Ayuda">
                            <span class="help material-symbols-outlined">help</span>
                        </button>
                    </div>
                    <div id="contador-relatos" class="relatos-count">
                </div>

            </section>

            <section class="relatos-grid-section">
                <div id="relatos-grid" class="relatos-grid">
                    <img src="/images/loading.svg" class="anim-loading" alt="Cargando...">
                </div>
                <div id="relatos-empty" class="relatos-empty" style="display:none;">
                    <span class="material-symbols-outlined empty-icon">sentiment_dissatisfied</span>
                    <p>No hay relatos en esta categoría aún.</p>
                    <a href="/crear-relato" class="btn-crear-relato small">Sé el primero en escribir</a>
                </div>
            </section>

        </main>
    </div>

    <script src="/js/comunidad.js?v={{ cacheVersion }}"></script>
</body>
</html>
