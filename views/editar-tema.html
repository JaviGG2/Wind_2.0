<!DOCTYPE html>
<html lang="es">
<head><style>body{background:#f5f6f8}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tema Histórico - Wind</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/base.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/estilos.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/menu.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/search.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/formularios-crear.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/editar-tema.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/css/subir-tema.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/editor-rico.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <link rel="stylesheet" href="/css/animaciones.css?v={{ cacheVersion }}">
    <meta name="theme-color" content="#ff4500">
</head>
<body>
    <script src="/js/menu.js?v={{ cacheVersion }}"></script>
    <div class="app-layout">
        <div id="menu-placeholder"></div>
        <main class="contenido-principal">
            <div class="crear-container">
                <header class="crear-header">
                    <h1>Editar Tema Histórico</h1>
                    <p class="muted">Modifica los datos de tu investigación histórica.</p>
                </header>

                <div class="crear-card">
                    <form id="formulario-editar-tema" enctype="multipart/form-data">
                        <input type="hidden" id="tema_id" name="id">

                        <div class="grupo-campo">
                            <label for="categoria_id">Eje Temático / Categoría:</label>
                            <select id="categoria_id" name="categoria_id" required>
                                <option value="" disabled selected>Selecciona una categoría...</option>
                                <option value="1">Arquitectura Colonial</option>
                                <option value="2">Tradiciones Indígenas (Caquetíos)</option>
                                <option value="3">Personajes Históricos</option>
                                <option value="4">Leyendas Falconianas</option>
                            </select>
                        </div>

                        <div class="grupo-campo">
                            <label for="titulo">Título del Tema:</label>
                            <input type="text" id="titulo" name="titulo" required placeholder="Ej. La Cruz de San Clemente">
                        </div>

                        <div class="grupo-campo">
                            <label>Imagen de Portada (Opcional):</label>
                            <div class="subida-archivo-zona">
                                <label for="imagen_portada" class="label-subida-archivo">
                                    <span class="material-symbols-outlined">add_photo_alternate</span>
                                    <span>Cambiar imagen de portada</span>
                                </label>
                                <input type="file" id="imagen_portada" name="imagen_portada" accept="image/*" class="hidden-input">
                                <div id="imagen-actual-contenedor">
                                    <p>Imagen actual:</p>
                                    <img id="imagen-actual" src="" alt="Imagen actual">
                                </div>
                            </div>
                        </div>

                        <div class="grupo-campo ubicacion-campo">
                            <label>Ubicación en Coro (opcional):</label>
                            <div id="ubicacion-badge" class="ubicacion-badge" style="display:none;">
                                <span class="material-symbols-outlined">location_on</span>
                                <span id="ubicacion-badge-texto">Ubicación guardada</span>
                                <button type="button" id="btn-editar-ubicacion" class="ubicacion-editar-btn" aria-label="Editar ubicación">
                                    <span class="material-symbols-outlined">edit</span>
                                </button>
                                <button type="button" id="btn-quitar-ubicacion" class="ubicacion-editar-btn" aria-label="Quitar ubicación" title="Quitar ubicación">
                                    <span class="material-symbols-outlined">delete</span>
                                </button>
                            </div>
                            <button type="button" id="btn-agregar-ubicacion" class="btn-agregar-ubicacion">
                                <span class="material-symbols-outlined">add_location</span>
                                <span>Agregar ubicación</span>
                            </button>
                            <input type="hidden" id="latitud" name="latitud">
                            <input type="hidden" id="longitud" name="longitud">
                            <input type="hidden" id="quitar-ubicacion" name="quitar_ubicacion" value="">
                        </div>

                        <div id="ubicacion-modal-overlay" class="modal-overlay" style="display:none;">
                            <div class="modal-contenido modal-ubicacion">
                                <div class="modal-header">
                                    <h3>Seleccionar ubicación</h3>
                                    <button type="button" id="btn-cerrar-ubicacion" class="modal-cerrar-btn" aria-label="Cerrar">
                                        <span class="material-symbols-outlined">close</span>
                                    </button>
                                </div>
                                <input type="text" id="buscar-ubicacion" placeholder="Buscar lugar en Coro..." class="input-ubicacion-modal">
                                <div id="mapa-ubicacion" class="mapa-ubicacion"></div>
                                <div class="coord-info" id="coord-info">
                                    <span>Lat: <strong id="coord-lat">—</strong></span>
                                    <span>Lng: <strong id="coord-lng">—</strong></span>
                                </div>
                                <button type="button" id="btn-guardar-ubicacion" class="boton-enviar" style="margin-top:10px;">Guardar ubicación</button>
                            </div>
                        </div>

                        <div class="grupo-campo editor-wrapper">
                            <label for="contenido">Contenido del Artículo:</label>
                            <div class="editor-toolbar">
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('bold')" title="Negrita"><span class="material-symbols-outlined">format_bold</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('italic')" title="Cursiva"><span class="material-symbols-outlined">format_italic</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('underline')" title="Subrayado"><span class="material-symbols-outlined">format_underline</span></button>
                                <span class="separador"></span>
                                <select onchange="ejecutarComando('formatBlock', this.value); this.selectedIndex=0;" title="Encabezado">
                                    <option value="" disabled selected>Estilo</option>
                                    <option value="h2">Título</option>
                                    <option value="h3">Subtítulo</option>
                                    <option value="p">Párrafo</option>
                                </select>
                                <select onchange="ejecutarComando('fontSize', this.value); this.selectedIndex=0;" title="Tamaño de fuente">
                                    <option value="" disabled selected>Tamaño</option>
                                    <option value="1">Pequeño</option>
                                    <option value="3">Normal</option>
                                    <option value="5">Grande</option>
                                </select>
                                <span class="separador"></span>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('insertUnorderedList')" title="Lista"><span class="material-symbols-outlined">format_list_bulleted</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('insertOrderedList')" title="Lista numerada"><span class="material-symbols-outlined">format_list_numbered</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('insertHorizontalRule')" title="Línea"><span class="material-symbols-outlined">horizontal_rule</span></button>
                                <span class="separador"></span>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('formatBlock', 'blockquote')" title="Cita"><span class="material-symbols-outlined">format_quote</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="insertarEnlace()" title="Enlace"><span class="material-symbols-outlined">link</span></button>
                            </div>
                            <div id="editor-contenido" class="editor-contenido" contenteditable="true"></div>
                            <textarea id="contenido" name="contenido" style="display:none;"></textarea>
                        </div>

                        <button type="submit" class="boton-enviar">Actualizar Tema</button>
                    </form>

                    <div id="mensaje-consola" class="mensaje-oculto"></div>

                    <p class="enlace-volver">
                        <a href="/dashboard" class="enlace-secundario">
                            <span class="material-symbols-outlined">arrow_back</span> Volver al Panel
                        </a>
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/editor-rico.js?v={{ cacheVersion }}"></script>
    <script src="/js/ubicacion-picker.js?v={{ cacheVersion }}"></script>
    <script src="/js/editar-tema.js?v={{ cacheVersion }}"></script>
</body>
</html>
