<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Tema Histórico - Wind</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/search.css">
    <link rel="stylesheet" href="/css/formularios-crear.css">
    <link rel="stylesheet" href="/css/editar-tema.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <meta name="theme-color" content="#ff4500">
</head>
<body>
    <script src="/js/menu.js"></script>
    <div class="app-layout">
        <div id="menu-placeholder"></div>
        <main class="contenido-principal">
            <div class="crear-container">
                <header class="crear-header">
                    <h1><span class="material-symbols-outlined">edit_note</span> Editar Tema Histórico</h1>
                    <p class="muted">Modifica los datos de tu investigación histórica.</p>
                </header>

                <div class="crear-card">
                    <form id="formulario-editar-tema" enctype="multipart/form-data">
                        <input type="hidden" id="tema_id" name="id">

                        <div class="grupo-campo">
                            <label for="categoria_id">Eje Temático / Categoría:</label>
                            <select id="categoria_id" name="categoria_id" required>
                                <option value="" disabled selected>Selecciona una categoría...</option>
                                <option value="1">Arquitectura Colonial</option>
                                <option value="2">Tradiciones Indígenas (Caquetíos)</option>
                                <option value="3">Personajes Históricos</option>
                                <option value="4">Leyendas Falconianas</option>
                            </select>
                        </div>

                        <div class="grupo-campo">
                            <label for="titulo">Título del Tema:</label>
                            <input type="text" id="titulo" name="titulo" required placeholder="Ej. La Cruz de San Clemente">
                        </div>

                        <div class="grupo-campo">
                            <label>Imagen de Portada (Opcional):</label>
                            <div class="subida-archivo-zona">
                                <label for="imagen_portada" class="label-subida-archivo">
                                    <span class="material-symbols-outlined">add_photo_alternate</span>
                                    <span>Cambiar imagen de portada</span>
                                </label>
                                <input type="file" id="imagen_portada" name="imagen_portada" accept="image/*" class="hidden-input">
                                <div id="imagen-actual-contenedor">
                                    <p>Imagen actual:</p>
                                    <img id="imagen-actual" src="" alt="Imagen actual">
                                </div>
                            </div>
                        </div>

                        <div class="grupo-campo">
                            <label for="contenido">Contenido del Artículo:</label>
                            <textarea id="contenido" name="contenido" rows="8" required placeholder="Redacta la investigación histórica..."></textarea>
                        </div>

                        <button type="submit" class="boton-enviar">Actualizar Tema</button>
                    </form>

                    <div id="mensaje-consola" class="mensaje-oculto"></div>

                    <p class="enlace-volver">
                        <a href="/dashboard" class="enlace-secundario">
                            <span class="material-symbols-outlined">arrow_back</span> Volver al Panel
                        </a>
                    </p>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/editar-tema.js"></script>
</body>
</html>
