<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Módulos - Wind</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/estilos.css">
  <link rel="stylesheet" href="/css/menu.css">
  <link rel="stylesheet" href="/css/formularios-crear.css">
  <link rel="stylesheet" href="/css/animaciones.css">
</head>
<body>
  <script src="/js/menu.js"></script>
  <div class="app-layout">
    <div id="menu-placeholder"></div>
    <main class="contenido-principal">
      <div style="margin-bottom:8px;">
        <a href="javascript:void(0)" class="btn-volver" onclick="history.back()">
          <span class="material-symbols-outlined">arrow_back</span>
          Atrás
        </a>
      </div>
      <div class="crear-container">
        <header class="crear-header">
          <h1><span class="material-symbols-outlined">folder_special</span> Mis Módulos</h1>
          <p class="muted">Administrá tus módulos de juego y sus niveles.</p>
        </header>
        <a href="/admin/crear-modulo" class="btn-outline" style="margin-bottom:20px;display:inline-flex;">
          <span class="material-symbols-outlined">add</span> Nuevo Módulo
        </a>
        <div id="admin-modulos-listado"></div>
        <div id="admin-modulos-mensaje" class="mensaje-oculto"></div>
      </div>
    </main>
  </div>
  <script src="/js/admin-modulos.js"></script>
</body>
</html>
