<!DOCTYPE html>
<html lang="en">
<head><style>body{background:#f5f6f8}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="/css/animaciones.css?v={{ cacheVersion }}">
</head>
<body>
    <div style="margin-bottom:8px;">
        <a href="javascript:void(0)" class="btn-volver" onclick="history.back()">
            <span class="material-symbols-outlined">arrow_back</span>
            Atrás
        </a>
    </div>
    <h1>Relatos</h1>

    <div id="relatos-container">
        <form id="form-relato" enctype="multipart/form-data">
            <label for="titulo-relato">Título del Relato:</label>
            <input type="text" id="titulo-relato" name="titulo" required>

            <label for="contenido-relato">Contenido del Relato:</label>
            <textarea id="contenido-relato" name="contenido" required></textarea>

            <label for="imagen-relato">Seleccionar Imagen (Opcional):</label>
            <input type="file" id="imagen-relato" name="imagen" accept="image/*">

            <button type="submit">Publicar Relato</button>
        </form>

        <div id="mensaje-consola"></div>
    </div>

    <div id="lista-relatos" style="margin-top: 30px;"></div>

    <script src="/js/Relatos.js?v={{ cacheVersion }}"></script>
    
</body>
</html>
