<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elige tu Avatar - Wind</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/select-avatar.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <link rel="stylesheet" href="/css/animaciones.css">
    <meta name="theme-color" content="#ff4500">
</head>
<body>
    <script src="/js/menu.js"></script>
    <div class="app-layout">
        <div id="menu-placeholder"></div>
        <main class="contenido-principal">
            <div class="selavatar-root">
                <div class="selavatar-header">
                    <a href="/ajustes-perfil" class="selavatar-back">
                        <span class="material-symbols-outlined">arrow_back</span>
                    </a>
                    <h2>Elige tu Avatar</h2>
                </div>

                <div class="selavatar-current">
                    <div class="selavatar-current-label">Avatar actual</div>
                    <img id="selavatar-current-img" src="/img/avatar.svg" alt="avatar actual" class="selavatar-current-img">
                </div>

                <div class="selavatar-tabs" id="selavatar-tabs"></div>

                <div class="selavatar-grid" id="selavatar-grid">
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                    <div class="selavatar-skeleton"></div>
                </div>

                <button id="selavatar-more" class="selavatar-more">
                    <span class="material-symbols-outlined">refresh</span>
                    Generar más
                </button>
            </div>
        </main>
    </div>

    <script src="/js/select-avatar.js"></script>
</body>
</html>
