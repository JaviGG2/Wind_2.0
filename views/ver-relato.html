<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relato — Wind</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/animaciones.css">
    <link rel="stylesheet" href="/css/ver-relato.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <meta name="theme-color" content="#ff4500">
</head>
<body>
    <div class="app-layout">
        <div id="menu-placeholder"></div>

        <main class="contenido-principal anim-fade-down">
            <div class="pantalla-relato">

                <div class="barra-superior">
                    <a href="/comunidad" class="btn-volver">
                        <span class="material-symbols-outlined">arrow_back</span>
                        Volver a Comunidad
                    </a>
                </div>

                <div id="bloque-carga" class="cargando-contenedor">
                    <div class="spinner"></div>
                    <p>Cargando relato...</p>
                </div>

                <article id="bloque-contenido" class="articulo-relato" style="display:none;">
                    <div class="relato-autor-block">
                        <div class="relato-autor-avatar" id="autor-avatar"></div>
                        <div class="relato-autor-info">
                            <div class="relato-autor-nombre" id="autor-nombre"></div>
                            <div class="relato-autor-fecha" id="autor-fecha"></div>
                        </div>
                    </div>
                    <h1 id="txt-titulo" class="relato-titulo-principal"></h1>
                    <div id="img-portada" class="relato-imagen-principal"></div>
                    <div id="txt-cuerpo" class="relato-cuerpo"></div>
                </article>

            </div>
        </main>
    </div>

    <script src="/js/menu.js"></script>
    <script src="/js/ver-relato.js"></script>
</body>
</html>
