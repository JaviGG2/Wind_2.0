<!DOCTYPE html>
<html lang="es">
<head><script>window.WIND_CACHE_VERSION='{{ cacheVersion }}'</script>
<style>body{background:#f5f6f8}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Wind</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="/css/base.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/estilos.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/info-popup.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/animaciones.css?v={{ cacheVersion }}">
</head>
<body>
    <main class="login-split anim-fade-down">
        <div class="login-fondo"><img src="/img/fondo.png" alt=""></div>
        <div class="login-panel-bienvenida anim-slide-up">
            <img src="/img/el1.png" alt="" class="deco-el el-1">
            <img src="/img/el2.png" alt="" class="deco-el el-2">
            <img src="/img/el3.png" alt="" class="deco-el el-3">
            <img src="/img/el4.png" alt="" class="deco-el el-4">
            <img src="/img/el5.png" alt="" class="deco-el el-5">
            <img src="/img/el6.png" alt="" class="deco-el el-6">
            <svg class="deco-bg-1" viewBox="0 0 500 200" preserveAspectRatio="none">
                <path d="M -10 200 Q 120 30 250 200 T 510 200" fill="none" stroke="rgba(255,69,0,0.2)" stroke-width="40" stroke-linecap="round"/>
            </svg>
            <svg class="deco-bg-2" viewBox="0 0 400 200" preserveAspectRatio="none">
                <path d="M 50 40 C 150 0 250 0 350 80" fill="none" stroke="rgba(255,69,0,0.15)" stroke-width="30" stroke-linecap="round"/>
            </svg>
            <div class="bienvenida-contenido">
                <img src="/img/logo2.png?v={{ cacheVersion }}" alt="Wind" style="width:100px;height:auto;margin:0 auto 20px;display:block;">
                <h1>Wind</h1>
                <p>Explora, aprende y preserva el patrimonio cultural de Coro. Descubre historias, tradiciones y secretos de nuestra tierra.</p>
                <div class="marcas-agua">
                    <span class="material-symbols-outlined">explore</span>
                    <span class="material-symbols-outlined">auto_stories</span>
                    <span class="material-symbols-outlined">Groups_2</span>
                </div>
            </div>
        </div>

        <div class="login-panel-form">
            
            <div class="tarjeta-registro" style="box-shadow:none;border:none;width:100%;">
                <div class="cabecera-login">
                    <img src="/img/logo2.png?v={{ cacheVersion }}" alt="Wind" class="logo-login">
                    <h2>Iniciar Sesión</h2>
                </div>
                <p>Ingresa tus credenciales para acceder a Wind.</p>

                <form id="formulario-login">
                    <div class="grupo-campo">
                        <label for="correo">Correo electrónico:</label>
                        <input type="email" id="correo" required placeholder="tu@correo.com">
                    </div>
                    <div class="grupo-campo">
                        <label for="contrasena">Contraseña:</label>
                        <div class="campo-con-ojo">
                            <input type="password" id="contrasena" required placeholder="Tu contraseña">
                            <button type="button" class="btn-ojo" data-target="contrasena" tabindex="-1">
                                <span class="material-symbols-outlined">visibility_off</span>
                            </button>
                        </div>
                    </div> 
                    
                    <button type="submit" class="boton-enviar">Ingresar</button> 
                    
                    <div id="mensaje-consola" class="mensaje-oculto"></div>

                    <p style="text-align:center;margin-top:12px;">
                        <a href="/recuperar-contrasena" class="enlace-secundario" style="font-size:0.85rem;">¿Olvidaste tu contraseña?</a>
                    </p>
                </form>

                <p class="texto-secundario">
                    ¿No tienes cuenta? <a href="/registro" class="enlace-secundario">Regístrate aquí</a>
                </p>
            </div>
        </div>
    </main>

    <script src="/js/login.js?v={{ cacheVersion }}"></script>
    <script type="module" src="/js/info-burbuja.js?v={{ cacheVersion }}"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
