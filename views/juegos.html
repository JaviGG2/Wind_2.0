<!DOCTYPE html>
<html lang="es">

<head><style>body{background:#f5f6f8}</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos — Wind</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<meta name="description"
        content="Pon a prueba tu conocimiento sobre el patrimonio de Coro. Juega trivias, gana puntos y aprende historia.">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="stylesheet" href="/css/base.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/home.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/menu.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/search.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/juegos-page.css?v={{ cacheVersion }}">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/css/info-popup.css?v={{ cacheVersion }}">
    <link rel="stylesheet" href="/css/animaciones.css?v={{ cacheVersion }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <meta name="theme-color" content="#ff4500">
</head>

<body>
    <script src="/js/menu.js?v={{ cacheVersion }}"></script>
    <script src="/js/search.js?v={{ cacheVersion }}"></script>
    <script src="/js/info.js?v={{ cacheVersion }}"></script>
    <script type="module" src="/js/info-burbuja.js?v={{ cacheVersion }}"></script>

    <div class="app-layout">
        <div id="buscar-placeholder"></div>
        <div id="menu-placeholder"></div>

        <main class="contenido-principal anim-fade-down">

            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
                <h1 class="titulo" style="margin:0;">Juegos</h1>
                <div style="display:flex; gap:8px; align-items:center;">
                    <button type="button" data-info="Ayuda-Jugar" class="btn-info-icono" aria-label="Ayuda">
                        <span class="help material-symbols-outlined">help</span>
                    </button>
                </div>
            </div>

            <div class="juegos-stats-bar">
                <div class="juego-stat">
                    <span class="material-symbols-outlined">star</span>
                    <div>
                        <strong id="mis-puntos-count">—</strong>
                        <small>Mis puntos</small>
                    </div>
                </div>
                <a href="/modulos" class="juego-stat-link">
                    <span class="material-symbols-outlined">layers</span>
                    <div>
                        <strong>Módulos</strong>
                        <small>Por niveles</small>
                    </div>
                </a>
                <a href="/ranking-game" class="juego-stat-link">
                    <span class="material-symbols-outlined">leaderboard</span>
                    <div>
                        <strong>Ranking</strong>
                        <small>Global</small>
                    </div>
                </a>
            </div>

            <section class="filtros-seccion">
                <div class="filtros-header">
                    <h2 class="filtros-titulo">Disfruta jugando</h2>
                    <div id="juegos-status" class="relatos-count"><img src="/images/loading.svg" class="anim-loading" alt="Cargando..."></div>
                </div>
            </section>

            <div id="juegos-grupos">
                <img src="/images/loading.svg" class="anim-loading" alt="Cargando...">
            </div>

        </main>
    </div>

    <script src="/js/popup-valoracion.js?v={{ cacheVersion }}"></script>
    <script src="/js/juegos-page.js?v={{ cacheVersion }}"></script>
</body>

</html>
