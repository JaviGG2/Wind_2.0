<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba QR — Wind</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/css/qr-modal.css?v={{ cacheVersion }}">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f5f6f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Rethink Sans', 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .qr-test-card {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .qr-test-card h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
            color: #111;
        }
        .qr-test-card p {
            margin: 0 0 24px;
            color: #888;
            font-size: 0.9rem;
        }
        .qr-test-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #FF4500;
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all .2s;
            font-family: inherit;
            box-shadow: 0 8px 28px rgba(255,69,0,0.35);
        }
        .qr-test-btn:hover {
            background: #e63e00;
            transform: translateY(-2px);
        }
        .qr-test-btn .material-symbols-outlined {
            font-size: 22px;
        }
    </style>
</head>
<body>
    <div class="qr-test-card">
        <h1>Prueba de QR</h1>
        <p>Presiona el botón para ver la animación de creación y un QR aleatorio.</p>
        <button class="qr-test-btn" id="btn-generar-qr">
            <span class="material-symbols-outlined">qr_code</span>
            Generar QR
        </button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/js/qr-modal.js?v={{ cacheVersion }}"></script>
    <script>
        document.getElementById('btn-generar-qr').addEventListener('click', function () {
            var randomId = 'WIND-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).substring(2, 6).toUpperCase();
            var url = 'https://wind.app/' + randomId;
            abrirQRModal({
                url: url,
                titulo: 'Código de prueba: ' + randomId
            });
        });
    </script>
</body>
</html>
