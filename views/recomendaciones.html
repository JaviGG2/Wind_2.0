<!DOCTYPE html>
<html lang="es">
<head><style>body{background:#f5f6f8}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recomendaciones — Wind</title>
  
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/estilos.css">
  <link rel="stylesheet" href="/css/menu.css">
  <link rel="stylesheet" href="/css/recomendaciones.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="/css/animaciones.css">
</head>
<body>
  <script src="/js/menu.js"></script>
  <div class="app-layout">
    <div id="menu-placeholder"></div>
    <main class="contenido-principal">
      <div class="recomendaciones-root anim-fade-down">
        <div style="margin-bottom:8px;">
          <a href="javascript:void(0)" class="btn-volver" onclick="history.back()">
            <span class="material-symbols-outlined">arrow_back</span>
            Atrás
          </a>
          
        </div>

        <header class="recom-header">
          <div class="recom-header-icon anim-float">
            <img src="/img/w1.png" alt="Wind" class="recom-logo">
            <img src="/img/w1-glow.png" alt="" class="recom-glow">
          </div>
          <div class="perfil-info">
            <h1>Recomendaciones</h1>
            <p class="muted">Contenido sugerido especialmente para ti, basado en tus visitas y en la similitud de los textos.</p>
          </div>
          <input type="text" id="recom-buscar" placeholder="Buscar recomendaciones..." class="input-buscar">
          </header>
        
         

        <section id="recom-personalizadas" class="recom-seccion">
          <h2>
            <span class="material-symbols-outlined">person</span>
            Para ti
          </h2>
          <div id="recom-listado" class="recom-grid">
            <p class="muted center">Cargando recomendaciones...</p>
          </div>

          <button id="btn-entrenar" class="boton-enviar" style="margin-top:12px;">
            <span class="material-symbols-outlined">refresh</span> Re-entrenar
          </button>
        </section>

        <section id="recom-estado" class="recom-seccion2">
          <h2>
            <span class="material-symbols-outlined">monitoring</span>
            Estado del motor
          </h2>
          <div id="recom-estado-info" class="recom-estado-card">
            <p class="muted">Verificando estado...</p>
          </div>
          <button id="btn-entrenar" class="boton-enviar" style="margin-top:12px;">
            <span class="material-symbols-outlined">refresh</span> Re-entrenar
          </button>
        </section>
      </div>
    </main>
  </div>
  

  <script src="/js/recomendaciones.js"></script>
</body>
</html>
