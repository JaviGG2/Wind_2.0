<!DOCTYPE html>
<html lang="es">
<head><style>body{background:#f5f6f8}</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Módulo - Wind</title>
  
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="/css/base.css?v={{ cacheVersion }}">
  <link rel="stylesheet" href="/css/estilos.css?v={{ cacheVersion }}">
  <link rel="stylesheet" href="/css/menu.css?v={{ cacheVersion }}">
  <link rel="stylesheet" href="/css/formularios-crear.css?v={{ cacheVersion }}">
  <link rel="stylesheet" href="/css/info-popup.css?v={{ cacheVersion }}">
  <link rel="stylesheet" href="/css/animaciones.css?v={{ cacheVersion }}">
</head>
<body>
  <script src="/js/menu.js?v={{ cacheVersion }}"></script>
  <script type="module" src="/js/info-burbuja.js?v={{ cacheVersion }}"></script>
  <div class="app-layout">
    <div id="menu-placeholder"></div>
    <main class="contenido-principal">
      <div class="crear-container">
        <header class="crear-header">
          <a href="javascript:history.back()" class="btn-retroceder" aria-label="Volver">
            <span class="material-symbols-outlined back-icon">arrow_back</span>
            Atrás
            <span class="back-text"></span>
          </a>
          <h1>Crear Módulo de Juego</h1>
          <p class="muted">Agrupa varios juegos en niveles dentro de un módulo.</p>
        </header>

        <div>
        <button type="button" data-info="Crear Relato Oficial o Módulo" class="btn-info-icono" aria-label="Información">
        <span class="help">¿Para qué sirve?</span>
        </button>
        </div>

        <div class="crear-card">
          <form id="form-crear-modulo">
            <div class="grupo-campo">
              <label for="nombre">Nombre del Módulo:</label>
              <input type="text" id="nombre" required placeholder="Ej. Historia de Coro">
            </div>
            <div class="grupo-campo">
              <label for="descripcion">Descripción:</label>
              <textarea id="descripcion" rows="3" placeholder="Descripción del módulo..."></textarea>
            </div>
            <button type="submit" class="boton-enviar">Crear Módulo</button>
          </form>
          <div id="mensaje-consola" class="mensaje-oculto"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="/js/crear-modulo.js?v={{ cacheVersion }}"></script>
</body>
</html>
