<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Módulo - Wind</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/estilos.css">
  <link rel="stylesheet" href="/css/menu.css">
  <link rel="stylesheet" href="/css/formularios-crear.css">
  <link rel="stylesheet" href="/css/info-popup.css">
</head>
<body>
  <script src="/js/menu.js"></script>
  <script src="/js/info.js"></script>
  <script type="module" src="/js/info-burbuja.js"></script>
  <div class="app-layout">
    <div id="menu-placeholder"></div>
    <main class="contenido-principal">
      <div class="crear-container">
        <header class="crear-header">
          <h1><span class="material-symbols-outlined">add_box</span> Crear Módulo de Juego</h1>
          <p class="muted">Agrupa varios juegos en niveles dentro de un módulo.</p>
        </header>

        <div>
        <button type="button" data-info="Crear Relato Oficial o Módulo" class="btn-info-icono" aria-label="Información">
        <span class="help">¿Para qué sirve?</span>
        </button>
        </div>

        <div class="crear-card">
          <form id="form-crear-modulo">
            <div class="grupo-campo">
              <label for="nombre">Nombre del Módulo:</label>
              <input type="text" id="nombre" required placeholder="Ej. Historia de Coro">
            </div>
            <div class="grupo-campo">
              <label for="descripcion">Descripción:</label>
              <textarea id="descripcion" rows="3" placeholder="Descripción del módulo..."></textarea>
            </div>
            <button type="submit" class="boton-enviar">Crear Módulo</button>
          </form>
          <div id="mensaje-consola" class="mensaje-oculto"></div>
          <p class="enlace-volver">
            <a href="/admin/modulos" class="enlace-secundario">
              <span class="material-symbols-outlined">arrow_back</span> Mis módulos
            </a>
          </p>
        </div>
      </div>
    </main>
  </div>
  <script src="/js/crear-modulo.js"></script>
</body>
</html>
