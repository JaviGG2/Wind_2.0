<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Tema Histórico - Wind</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/css/info-popup.css">
    <link rel="stylesheet" href="/css/base.css">
    <link class="sheet" rel="stylesheet" href="/css/estilos.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/search.css">
    <link rel="stylesheet" href="/css/formularios-crear.css">
    <link rel="stylesheet" href="/css/subir-tema.css">
    <link rel="stylesheet" href="/css/editor-rico.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="/css/animaciones.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Wind">
    <link rel="apple-touch-icon" href="/img/app.png">
    <meta name="theme-color" content="#ff4500">
</head>
<body>
    <script src="/js/menu.js"></script>
    <div class="app-layout">
        <div id="menu-placeholder"></div>
        <main class="contenido-principal">
            <div style="margin-bottom:8px;">
                <a href="javascript:void(0)" class="btn-volver" onclick="history.back()">
                    <span class="material-symbols-outlined">arrow_back</span>
                    Atrás
                </a>
            </div>
            <div class="crear-container">
                <header class="crear-header">
                    <h1><span class="material-symbols-outlined">menu_book</span> Publicar Tema Histórico</h1>
                    <p class="muted">Registra crónicas, datos arquitectónicos o tradiciones oficiales de Coro.</p>
                    <button type="button" data-info="crear-tema" class="btn-info-icono" aria-label="Información">
                    <span class="help">¿Que son los Temas?</span>
                </button>
                </header>

                <div class="crear-card">
                    <form id="formulario-subir-tema" enctype="multipart/form-data">
                        
                        <div class="grupo-campo">
                            <label for="categoria_id">Eje Temático / Categoría:</label>
                            <select id="categoria_id" required>
                                <option value="" disabled selected>Selecciona una categoría...</option>
                                <option value="1">Arquitectura Colonial</option>
                                <option value="2">Tradiciones Indígenas (Caquetíos)</option>
                                <option value="3">Personajes Históricos</option>
                                <option value="4">Leyendas Falconianas</option>
                            </select>
                        </div>

                        <div class="grupo-campo">
                            <label for="titulo">Título del Tema:</label>
                            <input type="text" id="titulo" required placeholder="Ej. La Cruz de San Clemente">
                        </div>

                        <div class="grupo-campo">
                            <label>Imagen de Portada (JPG / PNG):</label>
                            <div class="subida-archivo-zona">
                                <label for="imagen_portada" class="label-subida-archivo">
                                    <span class="material-symbols-outlined">add_photo_alternate</span>
                                    <span>Seleccionar imagen de portada</span>
                                </label>
                                <input type="file" id="imagen_portada" accept="image/*" class="hidden-input">
                                <div id="preview-container">
                                    <img id="image-preview" src="#" alt="Vista previa">
                                    <p class="texto-imagen-seleccionada">Imagen seleccionada</p>
                                </div>
                            </div>
                        </div>

                        <div class="grupo-campo editor-wrapper">
                            <label for="contenido">Contenido del Artículo:</label>
                            <div class="editor-toolbar">
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('bold')" title="Negrita"><span class="material-symbols-outlined">format_bold</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('italic')" title="Cursiva"><span class="material-symbols-outlined">format_italic</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('underline')" title="Subrayado"><span class="material-symbols-outlined">format_underlined</span></button>
                                <span class="separador"></span>
                                <select onchange="ejecutarComando('formatBlock', this.value); this.selectedIndex=0;" title="Encabezado">
                                    <option value="" disabled selected>Estilo</option>
                                    <option value="h2">Título</option>
                                    <option value="h3">Subtítulo</option>
                                    <option value="p">Párrafo</option>
                                </select>
                                <select onchange="ejecutarComando('fontSize', this.value); this.selectedIndex=0;" title="Tamaño de fuente">
                                    <option value="" disabled selected>Tamaño</option>
                                    <option value="1">Pequeño</option>
                                    <option value="3">Normal</option>
                                    <option value="5">Grande</option>
                                </select>
                                <span class="separador"></span>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('insertUnorderedList')" title="Lista"><span class="material-symbols-outlined">format_list_bulleted</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('insertOrderedList')" title="Lista numerada"><span class="material-symbols-outlined">format_list_numbered</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('insertHorizontalRule')" title="Línea"><span class="material-symbols-outlined">horizontal_rule</span></button>
                                <span class="separador"></span>
                                <button type="button" class="toolbar-btn-icon" onclick="ejecutarComando('formatBlock', 'blockquote')" title="Cita"><span class="material-symbols-outlined">format_quote</span></button>
                                <button type="button" class="toolbar-btn-icon" onclick="insertarEnlace()" title="Enlace"><span class="material-symbols-outlined">link</span></button>
                            </div>
                            <div id="editor-contenido" class="editor-contenido" contenteditable="true"></div>
                            <textarea id="contenido" style="display:none;"></textarea>
                        </div>

                        <button type="submit" class="boton-enviar">Publicar Tema</button>
                    </form>

                    <div id="mensaje-consola" class="mensaje-oculto"></div>

                </div>
            </div>
        </main>
    </div>

    <script src="/js/editor-rico.js"></script>
    <script src="/js/subir-tema.js"></script>
    <script type="module" src="/js/info-burbuja.js"></script>
    <script>
        const fileInput = document.getElementById('imagen_portada');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const labelUpload = document.querySelector('.label-subida-archivo');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.classList.add('mostrar');
                    labelUpload.innerHTML = '<span class="material-symbols-outlined">autorenew</span><span>Cambiar imagen de portada</span>';
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
