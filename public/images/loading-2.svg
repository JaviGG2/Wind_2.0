<svg viewBox="30 20 240 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    path {
      fill: none;
      stroke: #FF5500;
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100 100;
      stroke-dashoffset: 2000;
      animation: dibujarContinuo 15s linear infinite;
