<svg viewBox="-5 -15 510 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    path {
      fill: none;
      stroke: #FF5500;
      stroke-width: 24;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100 100;
      stroke-dashoffset: 2000;
      animation: latigo 5s cubic-bezier(0.2, 0.8, 0.4, 1) infinite;
