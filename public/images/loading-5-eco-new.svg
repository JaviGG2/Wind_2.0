<svg viewBox="-5 -15 510 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    path {
      fill: none;
      stroke: #FF5500;
      stroke-width: 44;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 3000;
      stroke-dashoffset: 3000;
      opacity: 0;
      animation: eco 6s ease-in-out infinite;
    }
    @keyframes eco {
      0%   { stroke-dashoffset: 3000; opacity: 0; }
      3%   { opacity: 1; }
      35%  { stroke-dashoffset: 0; opacity: 1; }
      55%  { stroke-dashoffset: 0; opacity: 0; }
      100% { stroke-dashoffset: 3000; opacity: 0; }
    }
  </style>
  <path d="M 25 70 C 80 25, 60 190, 115 190 C 170 190, 175 45, 230 55 C 285 65, 215 200, 275 200 C 335 200, 360 20, 475 40" />
</svg>
