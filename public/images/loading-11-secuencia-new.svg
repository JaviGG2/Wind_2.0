<svg viewBox="30 30 380 150" xmlns="http://www.w3.org/2000/svg">
  <style>
    path {
      fill: none;
      stroke: #FF5500;
      stroke-width: 32;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 9999;
      stroke-dashoffset: 9999;
      opacity: 0;
      animation: secuenciaSuave 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    @keyframes secuenciaSuave {
      0%   { stroke-dashoffset: 9999; opacity: 0; }
      5%   { opacity: 1; }
      25%  { stroke-dashoffset: 0; opacity: 1; }
      35%  { stroke-dashoffset: 0; opacity: 0; }
      100% { stroke-dashoffset: 9999; opacity: 0; }
    }
  </style>
  <path d="M 80 100 C 40 40, 160 40, 200 100 C 240 160, 360 160, 320 100 C 280 40, 400 40, 440 100" />
</svg>