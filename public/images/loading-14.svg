<svg viewBox="10 5 490 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    path {
      fill: none;
      stroke: #FF5500;
      stroke-width: 20;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100 100;
      stroke-dashoffset: 2000;
      animation: dibujarContinuo 20s linear infinite;
    }
    @keyframes dibujarContinuo {
      0%   { stroke-dashoffset: 2000; }
      100% { stroke-dashoffset: 0; }
    }
  </style>
  <path d="M 20 160 C 80 10, 160 10, 250 100 C 340 190, 420 190, 480 100" />
</svg>
