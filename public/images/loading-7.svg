<svg viewBox="30 20 380 170" xmlns="http://www.w3.org/2000/svg">
  <style>
    path {
      fill: none;
      stroke: #FF5500;
      stroke-width: 18;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100 100;
      stroke-dashoffset: 2000;
      animation: dibujarContinuo 15s linear infinite;
    }
    @keyframes dibujarContinuo {
      0%   { stroke-dashoffset: 2000; }
      100% { stroke-dashoffset: 0; }
    }
  </style>
  <path d="M 100 100 C 50 30, 150 30, 200 100 C 250 170, 350 170, 300 100 C 250 30, 350 30, 400 100" />
</svg>
