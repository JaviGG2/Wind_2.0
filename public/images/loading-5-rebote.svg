<svg viewBox="-5 -15 510 250" xmlns="http://www.w3.org/2000/svg">
  <style>
    path {
      fill: none;
      stroke: #FF5500;
      stroke-width: 24;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 100 100;
      stroke-dashoffset: 2000;
      animation: rebote 8s cubic-bezier(0.6, 1.6, 0.4, 0.8) infinite;
    }
    @keyframes rebote {
      0%   { stroke-dashoffset: 2000; }
      35%  { stroke-dashoffset: 0; }
      50%  { stroke-dashoffset: 300; }
      62%  { stroke-dashoffset: 0; }
      72%  { stroke-dashoffset: 150; }
      80%  { stroke-dashoffset: 0; }
      86%  { stroke-dashoffset: 60; }
      91%  { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 2000; }
    }
  </style>
  <path d="M 25 70 C 80 25, 60 190, 115 190 C 170 190, 175 45, 230 55 C 285 65, 215 200, 275 200 C 335 200, 360 20, 475 40" />
</svg>
